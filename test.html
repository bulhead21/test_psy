function shuf(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function start() {
    shuf(raw);
    raw.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="question">${i+1}. ${item.q}</div>
            <div class="btns">
                ${item.a.map((o, idx) => `<button onclick="ans(${idx},${item.c},this)">${o}</button>`).join('')}
            </div>`;
        cont.appendChild(div);
    });
}

window.ans = (sel, cor, btn) => {
    const bs = btn.parentElement.querySelectorAll('button');
    bs.forEach(b => b.disabled = true);
    if(sel === cor) {
        btn.classList.add('correct');
        c_scr++;
    } else {
        btn.classList.add('wrong');
        bs[cor].classList.add('correct');
    }
    a_scr++;
    document.getElementById('c_count').innerText = c_scr;
    document.getElementById('p_text').innerText = "Вопрос: " + a_scr + " из 119";
